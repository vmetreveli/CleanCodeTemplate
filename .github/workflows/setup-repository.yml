name: Setup Repository

on:
  push:
    branches:
      - main
    paths:
      - cookiecutter.json

permissions:
  contents: write
  packages: read
  pull-requests: write

jobs:
  setup:
    name: Generate Project From Template
    if: github.event.head_commit.message != 'Initial generated project'
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ----------------------------------------------------------------------
      # Prevent execution on the template repository itself
      # ----------------------------------------------------------------------
      - name: Check repository is not template source
        shell: bash
        run: |
          TEMPLATE=$(curl --silent \
            -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }} \
            | jq -r '.is_template')

          echo "Repository template flag: $TEMPLATE"

          if [[ "$TEMPLATE" == "true" ]]; then
            echo "This is the template repository itself. Skipping."
            exit 0
          fi

      # ----------------------------------------------------------------------
      # Checkout
      # ----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------------
      # Setup Python
      # ----------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ----------------------------------------------------------------------
      # Install Cookiecutter
      # ----------------------------------------------------------------------
      - name: Install Cookiecutter
        run: |
          python -m pip install --upgrade pip
          pip install cookiecutter

      # ----------------------------------------------------------------------
      # Generate project
      # ----------------------------------------------------------------------
      - name: Generate project
        run: |
          cookiecutter . \
            --no-input \
            --output-dir ./generated

      # ----------------------------------------------------------------------
      # Clean template files
      # ----------------------------------------------------------------------
      - name: Clean template repository
        shell: bash
        run: |
          find . -maxdepth 1 \
            ! -name '.git' \
            ! -name 'generated' \
            ! -name '.' \
            -exec rm -rf {} +

      # ----------------------------------------------------------------------
      # Move generated files
      # ----------------------------------------------------------------------
      - name: Move generated project files
        shell: bash
        run: |
          rsync -a ./generated/*/ ./
          rm -rf ./generated

      # ----------------------------------------------------------------------
      # Setup .NET with GitHub Packages authentication
      # ----------------------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          source-url: https://nuget.pkg.github.com/vmetreveli/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------------
      # Restore
      # ----------------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      # ----------------------------------------------------------------------
      # Build
      # ----------------------------------------------------------------------
      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      # ----------------------------------------------------------------------
      # Test
      # ----------------------------------------------------------------------
      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      # ----------------------------------------------------------------------
      # Create labels
      # ----------------------------------------------------------------------
      - name: Create repository labels
        shell: bash
        run: |
          gh label create "bug" \
            --color "d73a4a" \
            --description "Something isn't working" || true

          gh label create "enhancement" \
            --color "a2eeef" \
            --description "New feature or request" || true

          gh label create "documentation" \
            --color "0075ca" \
            --description "Documentation improvements" || true

          gh label create "technical-debt" \
            --color "5319e7" \
            --description "Refactoring or cleanup work" || true

      # ----------------------------------------------------------------------
      # Prepare generated project in a separate branch
      # ----------------------------------------------------------------------
      - name: Create generated branch
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b generated-project
          git add .
          git commit -m "Initial generated project"

          git push --force origin generated-project

      # ----------------------------------------------------------------------
      # Create Pull Request to protected main branch
      # ----------------------------------------------------------------------
      - name: Create Pull Request
        shell: bash
        run: |
          gh pr create \
            --base main \
            --head generated-project \
            --title "Initial generated project" \
            --body "Automatically generated project from Cookiecutter template."

      # ----------------------------------------------------------------------
      # Summary
      # ----------------------------------------------------------------------
      - name: Summary
        run: |
          echo "Repository successfully generated."
          echo "Generated project pushed to branch: generated-project"
          echo "Pull request created against protected main branch."
